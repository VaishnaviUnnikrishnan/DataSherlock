version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: datasherlock_api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: datasherlock_worker
    command: dramatiq worker.celery_worker
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: datasherlock_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  superset:
    image: apache/superset:3.1.3
    container_name: datasherlock_superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=supersecretkey123
    restart: unless-stopped
